name: Actualizar Promociones Diarias

on:
  schedule:
    # Ejecutar todos los días a las 9:00 UTC (6:00 AM Argentina)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true  # Necesario para hacer push después
      
      - name: 🐍 Configuración de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalación de Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Instalar Playwright Browsers
        run: |
          echo "🔄 Instalando Playwright..."
          playwright install chromium
          playwright install-deps chromium
      
      - name: 📁 Crear directorios necesarios
        run: |
          mkdir -p data
          mkdir -p data/cache
          mkdir -p data/history
          mkdir -p logs
          mkdir -p config
      
      - name: ⚙️ Verificar configuración
        id: check-config
        run: |
          if [ ! -f config/settings.json ]; then
            echo "⚠️ No existe settings.json. Generando uno básico..."
            mkdir -p scripts
            touch scripts/utils.py
            # Crear un JSON mínimo si falta
            echo '{"comercios_normalizados": {}, "scraping": {"timeout": 30000}}' > config/settings.json
          fi
          echo "✅ Configuración lista"
      
      - name: 🕷️ Ejecutar Scrapers
        run: |
          echo "🚀 Iniciando scraping..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/main.py || {
            echo "❌ El scraping falló. Revisa los logs."
            cat logs/scraping.log
            exit 1
          }
      
      - name: 🔍 Validar archivos generados
        run: |
          ls -la data/
          if [ ! -f data/promos.json ]; then
             echo "❌ ERROR: No se generó data/promos.json"
             exit 1
          fi
      
      - name: 🧹 Limpiar historial antiguo (>30 días)
        run: find data/history -name "*.json" -mtime +30 -delete
      
      - name: 🤖 Configurar Git (Usuario Bot)
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
      
      - name: 📝 Commit de cambios
        id: commit
        run: |
          # Agregar archivos modificados
          git add data/
          
          # Verificar si hay cambios reales
          if git diff --staged --quiet; then
            echo "status=unchanged" >> $GITHUB_OUTPUT
          else
            git commit -m "🔄 Actualización automática $(date +'%Y-%m-%d %H:%M') - Promo System"
            git push || { echo "❌ Error al hacer push"; exit 1; }
            echo "status=changed" >> $GITHUB_OUTPUT
          fi
      
      - name: 📊 Resumen
        run: |
          TOTAL=$(cat data/promos.json 2>/dev/null | grep -o '"total_promociones":[0-9]*' | grep -o '[0-9]*' || echo "0")
          if [ "${{ steps.commit.outputs.status }}" == "changed" ]; then
            echo "✅ Datos actualizados en repositorio (Total: $TOTAL)"
          else
            echo "ℹ️ Datos no cambiaron (Total: $TOTAL)"
          finame: Actualizar Promociones Diarias

