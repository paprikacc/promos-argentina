name: Actualizar Promociones Diarias

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-22.04
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Instalar Playwright
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: 📁 Crear directorios
        run: |
          mkdir -p data/cache data/history logs config debug_screenshots
      
      - name: 🔍 Verificar main.py
        run: |
          echo "=========================================="
          echo "📄 Verificando versión de main.py"
          echo "=========================================="
          head -n 5 scripts/main.py
          echo "..."
          echo ""
          echo "🔎 Buscando línea clave 'scrapers.__all__':"
          grep -n "scrapers.__all__" scripts/main.py && echo "✅ ENCONTRADO - Versión nueva" || echo "❌ NO ENCONTRADO - Versión vieja"
          echo ""
          echo "🔎 Buscando 'Intento':"
          grep -n "Intento" scripts/main.py && echo "❌ ENCONTRADO - Versión vieja" || echo "✅ NO ENCONTRADO - Versión nueva"
          echo "=========================================="
      
      - name: ⚙️ Verificar config
        run: |
          if [ ! -f config/settings.json ]; then
            echo '{"scraping":{"timeout":30000,"retry_attempts":3}}' > config/settings.json
          fi
      
      - name: 🕷️ Ejecutar Scrapers
        run: |
          python scripts/main.py || exit 1
      
      - name: 🔍 Validar archivos
        run: |
          ls -lah data/
          [ -f data/promos.json ] || exit 1
          head -n 10 data/promos.json
      
      - name: 🤖 Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 📝 Commit y Push
        run: |
          git add data/
          git diff --staged --quiet || {
            git commit -m "Update $(date +'%Y-%m-%d') [skip ci]"
            git push
          }
      
      - name: 📤 Subir screenshots de debug
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: debug_screenshots/
          retention-days: 7
          if-no-files-found: warn
