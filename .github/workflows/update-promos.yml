name: Actualizar Promociones Diarias

on:
  schedule:
    # Ejecutar todos los días a las 9:00 UTC (6:00 AM Argentina)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecución manual

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: 🐍 Configuración de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalación de Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Instalar Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium
      
      - name: 📁 Crear directorios necesarios
        run: |
          mkdir -p data/cache
          mkdir -p data/history
          mkdir -p logs
          mkdir -p config
      
      - name: ⚙️ Verificar configuración
        run: |
          if [ ! -f config/settings.json ]; then
            echo "⚠️ Creando settings.json por defecto..."
            echo '{"comercios_normalizados": {}, "scraping": {"timeout": 30000, "retry_attempts": 3}}' > config/settings.json
          fi
          echo "✅ Configuración verificada"
      
      - name: 🕷️ Ejecutar Scrapers
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🚀 Iniciando scraping..."
          python scripts/main.py || {
            echo "❌ Error en scraping. Mostrando logs..."
            if [ -f logs/scraping.log ]; then
              tail -n 50 logs/scraping.log
            fi
            exit 1
          }
      
      - name: 🔍 Validar archivos generados
        run: |
          echo "📁 Contenido de data/:"
          ls -lah data/
          
          if [ ! -f data/promos.json ]; then
            echo "❌ ERROR: No se generó promos.json"
            exit 1
          fi
          
          echo "✅ Archivos generados correctamente"
      
      - name: 🧹 Limpiar historial antiguo
        run: |
          echo "🗑️ Limpiando archivos antiguos..."
          find data/history -name "*.json" -type f -mtime +30 -delete 2>/dev/null || true
      
      - name: 🤖 Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 📝 Commit y Push
        run: |
          git add data/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No hay cambios para commitear"
          else
            TOTAL=$(grep -o '"total_promociones":[0-9]*' data/promos.json | grep -o '[0-9]*' || echo "0")
            git commit -m "🔄 Update $(date +'%Y-%m-%d %H:%M') - $TOTAL promos [skip ci]"
            git push
            echo "✅ Cambios pusheados exitosamente"
          fi
      
      - name: 📊 Resumen Final
        if: always()
        run: |
          if [ -f data/promos.json ]; then
            TOTAL=$(grep -o '"total_promociones":[0-9]*' data/promos.json | grep -o '[0-9]*' || echo "0")
            echo "📊 Total de promociones: $TOTAL"
          fi
          
          if [ -f data/last-update.json ]; then
            echo "📄 Metadata:"
            cat data/last-update.json
          fi
