name: Actualizar Promociones Diarias

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scrape-and-update:
    runs-on: ubuntu-22.04  # ← CAMBIO CRÍTICO: Usar Ubuntu 22.04
    
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 📦 Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🎭 Instalar Playwright
        run: |
          echo "Instalando Playwright..."
          playwright install chromium
          playwright install-deps chromium
      
      - name: 📁 Crear directorios
        run: |
          mkdir -p data/cache
          mkdir -p data/history
          mkdir -p logs
          mkdir -p config
      
      - name: ⚙️ Verificar y crear config
        run: |
          if [ ! -f config/settings.json ]; then
            echo "Creando config por defecto..."
            cat > config/settings.json << 'EOF'
{
  "comercios_normalizados": {},
  "bancos_normalizados": {},
  "metodos_pago_normalizados": {},
  "palabras_clave_invalidas": [],
  "scraping": {
    "timeout": 30000,
    "retry_attempts": 3,
    "delay_between_scrapers": 2000
  },
  "cache": {
    "enabled": true,
    "ttl_hours": 6
  },
  "scoring": {
    "pesos": {
      "descuento_alto": 40,
      "sin_tope": 25,
      "todos_los_dias": 15,
      "metodos_multiples": 10,
      "vigencia_larga": 10
    },
    "umbral_destacada": 70
  },
  "fraud_detection": {
    "descuento_max_sospechoso": 90,
    "palabras_sospechosas": []
  }
}
EOF
          fi
          echo "✅ Config verificado"
      
      - name: 🕷️ Ejecutar Scrapers
        env:
          HEADLESS: "true"
          USE_CACHE: "true"
        run: |
          echo "🚀 Iniciando scraping..."
          python scripts/main.py || {
            echo "❌ Error en scraping"
            if [ -f logs/scraping.log ]; then
              echo "📋 Últimas 100 líneas del log:"
              tail -n 100 logs/scraping.log
            fi
            exit 1
          }
      
      - name: 🔍 Validar archivos
        run: |
          echo "📊 Verificando archivos generados..."
          ls -lah data/
          
          if [ ! -f data/promos.json ]; then
            echo "❌ ERROR: No se generó promos.json"
            exit 1
          fi
          
          echo "✅ Archivos OK"
          
          # Mostrar primeras líneas del JSON
          echo "📄 Contenido de promos.json (primeras 20 líneas):"
          head -n 20 data/promos.json
      
      - name: 🧹 Limpiar historial antiguo
        run: |
          find data/history -name "*.json" -type f -mtime +30 -delete 2>/dev/null || true
      
      - name: 🤖 Configurar Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: 📝 Commit y Push
        run: |
          git add data/
          
          if git diff --staged --quiet; then
            echo "ℹ️ No hay cambios para commitear"
          else
            TOTAL=$(grep -o '"total_promociones":[0-9]*' data/promos.json 2>/dev/null | grep -o '[0-9]*' || echo "0")
            FECHA=$(date +'%Y-%m-%d %H:%M')
            
            git commit -m "🔄 Actualización $FECHA - $TOTAL promociones [skip ci]"
            git push
            
            echo "✅ Cambios pusheados: $TOTAL promociones"
          fi
      
      - name: 📊 Resumen
        if: always()
        run: |
          if [ -f data/promos.json ]; then
            TOTAL=$(grep -o '"total_promociones":[0-9]*' data/promos.json | grep -o '[0-9]*' || echo "0")
            echo "📊 Total de promociones: $TOTAL"
          fi
          
          if [ -f data/last-update.json ]; then
            echo "📄 Metadata:"
            cat data/last-update.json | head -n 20
          fi
      
      - name: 📤 Subir logs (si falla)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: logs-error-${{ github.run_number }}
          path: |
            logs/
          retention-days: 7
