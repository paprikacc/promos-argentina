name: Actualizar Promociones Diarias

on:
  schedule:
    # Ejecutar todos los días a las 6:00 AM (Argentina UTC-3 = 9:00 UTC)
    - cron: '0 9 * * *'
  workflow_dispatch: # Permite ejecución manual desde GitHub

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Install Playwright browsers
      run: |
        playwright install chromium
        playwright install-deps chromium
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Run scrapers
      run: python scripts/main.py
      env:
        HEADLESS: true
    
    - name: Commit and push if changed
      run: |
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git config --global user.name "github-actions[bot]"
        git add data/
        git diff --quiet && git diff --staged --quiet || (
          git commit -m "🔄 Actualización automática $(date +'%Y-%m-%d %H:%M') - $(cat data/last-update.json | grep -o '"total_promociones":[0-9]*' | grep -o '[0-9]*') promociones" && 
          git push
        )
